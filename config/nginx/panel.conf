# ─────────────────────────────────────────────────────────────────
# Nginx — Configuración del Panel Pterodactyl (Producción con SSL)
# ─────────────────────────────────────────────────────────────────

# Redirección HTTP → HTTPS
server {
    listen 80;
    server_name panel.yeremi.work;
    return 301 https://$host$request_uri;
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    server_name panel.yeremi.work;

    # SSL — Let's Encrypt (montado desde el host)
    ssl_certificate     /etc/letsencrypt/live/panel.yeremi.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.yeremi.work/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Cabeceras de seguridad
    add_header X-Content-Type-Options  nosniff;
    add_header X-XSS-Protection        "1; mode=block";
    add_header X-Frame-Options         DENY;
    add_header Referrer-Policy         same-origin;

    # Proxy al contenedor del panel (PHP-FPM en puerto 9000)
    location / {
        proxy_pass         http://panel:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # Logs
    access_log /var/log/nginx/panel.access.log;
    error_log  /var/log/nginx/panel.error.log;
}
